queries:
  # Person / pedestrian evasion — core focus
  - "adversarial patch person detection evasion"
  - "adversarial patch pedestrian detection"
  - "adversarial patch hide person yolo"
  - "physical adversarial patch person detector surveillance"
  - "wearable adversarial patch evade human detection"
  # YOLO-family specific
  - "adversarial patch yolov8"
  - "adversarial patch yolo11"
  - "adversarial patch yolo ultralytics"
  - "adversarial patch anchor-free object detector"
  - "adversarial patch end-to-end object detection"
  # Transfer and generalization
  - "transferability adversarial patch yolo cross-version"
  - "adversarial patch transfer person detector"
  # Physical world
  - "physical adversarial patch person evasion real world"
  - "adversarial t-shirt patch wearable"
  # Defense
  - "adversarial patch detector defense person detection"

  # ---------------------------------------------------------------
  # YOLO26 / end-to-end detector block (new for this cycle)
  # ---------------------------------------------------------------
  # Hungarian matching is the root cause of the v26n paradox.
  # YOLO26 uses the same one2one assignment as DETR-family models.
  # Papers attacking DETR directly are the primary source of loss
  # designs that can actually target the one2one head.
  - "adversarial attack DETR detection transformer"
  - "adversarial patch detection transformer end-to-end"
  - "adversarial attack Hungarian matching object detection"
  - "adversarial attack bipartite matching object detector"
  - "adversarial patch NMS-free object detector"
  - "adversarial attack RT-DETR"
  - "adversarial patch YOLOv9"
  - "adversarial patch YOLOv10"
  - "adversarial attack one-to-one assignment detector"
  - "adversarial perturbation DETR object query manipulation"
  - "gradient attack end-to-end transformer detector"
  - "adversarial attack DINO DETR DAB-DETR"
  # Differentiable matching relaxations — needed to backprop through Hungarian
  - "sinkhorn matching adversarial object detection"
  - "differentiable matching adversarial attack detector"
  # Dual-head / auxiliary-head attack design
  - "adversarial attack auxiliary head primary head detector"
  - "adversarial loss design one-to-one one-to-many detection"
  # YOLO26 architecture understanding (to reverse-engineer loss targets)
  - "YOLO end-to-end detection one-to-one matching ultralytics"
  - "YOLOv10 NMS-free detection head adversarial"
  # RT-DETR specifically (closest published architecture to YOLO26 backbone)
  - "RT-DETR adversarial robustness real-time detection transformer"

